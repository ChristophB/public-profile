baseurl = "https://christoph-beger.de"
title = "Christoph Beger's Profile"
theme = "hugo-coder"
languagecode = "en"
defaultcontentlanguage = "en"

[pagination]
pagerSize = 20

[markup.highlight]
style = "github-dark"

[caches]
  [caches.images]
    dir = ':cacheDir/images'

[params]
  author = "Christoph Beger"
  info = "Computer Scientist and Full Stack DevOps"
  description = "Christoph Beger's personal website"
  keywords = "blog,developer,personal"
  avatarurl = "images/avatar.jpg"

  faviconSVG = "/img/favicon.svg"
  favicon_32 = "/img/favicon-32x32.png"
  favicon_16 = "/img/favicon-16x16.png"

  since = 2026

  colorScheme = "auto"
  hidecolorschemetoggle = false

[taxonomies]
  category = "categories"
  series = "series"
  tag = "tags"
  author = "authors"

# Social links
[[params.social]]
  name = "Github"
  icon = "fa-brands fa-github fa-2x"
  weight = 1
  url = "https://github.com/christophb/"
[[params.social]]
  name = "Twitter"
  icon = "fa-brands fa-orcid fa-2x"
  weight = 2
  url = "https://orcid.org/0000-0002-1166-0368"

